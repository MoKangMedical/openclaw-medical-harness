# Auto-label PRs based on changed files
documentation:
  - changed-files:
      - any-glob-to-any-file: ['docs/**', '*.md', '**/*.md']

python:
  - changed-files:
      - any-glob-to-any-file: ['**/*.py', 'pyproject.toml', 'setup.py']

ci:
  - changed-files:
      - any-glob-to-any-file: ['.github/**']

tests:
  - changed-files:
      - any-glob-to-any-file: ['tests/**', '**/test_*.py']
