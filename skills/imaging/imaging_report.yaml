name: imaging_report_analysis
version: "1.0.0"
description: >
  Analyze medical imaging reports (CT, MRI, X-ray, Ultrasound).
  Extract findings, identify critical values, generate structured reports.
author: MoKangMedical
license: MIT
category: imaging
tags: [radiology, imaging, CT, MRI, structured-reporting]

input_schema:
  type: object
  required: [report_text]
  properties:
    report_text: {type: string}
    imaging_type: {type: string, enum: [CT, MRI, X-ray, Ultrasound, PET-CT]}
    body_region: {type: string}
    clinical_question: {type: string}

output_schema:
  type: object
  properties:
    structured_findings:
      type: array
      items:
        type: object
        properties:
          finding: {type: string}
          location: {type: string}
          severity: {type: string}
          dimensions: {type: string}
    critical_values: {type: array, items: {type: string}}
    impression: {type: string}
    recommendations: {type: array, items: {type: string}}
    follow_up: {type: string}
    confidence: {type: number}

harness:
  type: diagnosis
  config:
    extract_measurements: true
    identify_critical: true

validation:
  required_output_fields: [structured_findings, impression, confidence]

execution:
  timeout_seconds: 60
  model: mimo
